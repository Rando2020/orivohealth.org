name: Validate Orivo Academy

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - 'lms/**'

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: package.json
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Install SQLite
        run: sudo apt-get update && sudo apt-get install -y sqlite3
      - name: Unit, registry, and instructional quality tests
        shell: bash
        run: |
          set -o pipefail
          npm run test 2>&1 | tee test.log
      - name: Validate SQL learning dataset
        shell: bash
        run: |
          set -o pipefail
          npm run test:sql 2>&1 | tee sql-validation.log
      - name: Type-check and production build
        shell: bash
        run: |
          set -o pipefail
          npm run build 2>&1 | tee build.log
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Browser smoke tests
        shell: bash
        run: |
          set -o pipefail
          npm run test:e2e 2>&1 | tee playwright.log
      - name: Upload validation evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-evidence
          if-no-files-found: ignore
          path: |
            test.log
            sql-validation.log
            build.log
            playwright.log
            artifacts/
            playwright-report/
            test-results/
