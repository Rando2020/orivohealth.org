name: Validate Orivo Academy

on:
  pull_request:
    branches: [main]
  push:
    branches:
      - 'lms/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Type-check and build
        run: npm run build
